{% extends "base.html" %}
{% block content %}

<h1 data-i18n="simv_title">Simulador Comparativo Visual</h1>

<div class="card">
  <h3 data-i18n="simv_select_strategies">Selecciona Estrategias</h3>

  <label><input type="checkbox" value="manual" /> <span data-i18n="simv_my_play">Mi Jugada</span></label><br />
  <label><input type="checkbox" value="optimized" /> <span data-i18n="simv_optimized">Optimizada</span></label><br />
  <label><input type="checkbox" value="historical" /> <span data-i18n="simv_historical">Historica</span></label><br />

  <br />

  <input
    type="text"
    id="manualPlay"
    class="input-field"
    data-i18n-placeholder="simv_manual_placeholder"
    placeholder="Si eliges manual: 1,5,8,10,12..."
  />

  <br /><br />

  <button onclick="runMultiSimulation()" class="regen-btn" data-i18n="simv_run">
    Ejecutar Comparacion Visual
  </button>
</div>

<br />

<div id="comparisonContainer"></div>

<script>
  Object.assign(KA.i18n.es, {
    simv_title: "Simulador Comparativo Visual",
    simv_select_strategies: "Selecciona Estrategias",
    simv_my_play: "Mi Jugada",
    simv_optimized: "Optimizada",
    simv_historical: "Historica",
    simv_manual_placeholder: "Si eliges manual: 1,5,8,10,12...",
    simv_run: "Ejecutar Comparacion Visual",
    simv_error: "No se pudo ejecutar la simulacion",
    simv_best: "[BEST] MAS CERCANA",
    simv_simulated: "Simulado: {v}",
    simv_real: "Real: {v}",
    simv_diff: "Diferencia: {v}",
    simv_precision: "Precision: {v}%",
    simv_distribution: "Distribucion",
    simv_strategy_ranking: "Ranking Estrategico Adaptativo",
    simv_top: "[TOP]",
    simv_avg_precision: "Precision Promedio: {v}%",
    simv_runs: "Corridas: {v}",
  });
  Object.assign(KA.i18n.en, {
    simv_title: "Visual Comparison Simulator",
    simv_select_strategies: "Select Strategies",
    simv_my_play: "My Play",
    simv_optimized: "Optimized",
    simv_historical: "Historical",
    simv_manual_placeholder: "If manual, enter: 1,5,8,10,12...",
    simv_run: "Run Visual Comparison",
    simv_error: "Could not run simulation",
    simv_best: "[BEST] CLOSEST",
    simv_simulated: "Simulated: {v}",
    simv_real: "Real: {v}",
    simv_diff: "Difference: {v}",
    simv_precision: "Precision: {v}%",
    simv_distribution: "Distribution",
    simv_strategy_ranking: "Adaptive Strategy Ranking",
    simv_top: "[TOP]",
    simv_avg_precision: "Average Precision: {v}%",
    simv_runs: "Runs: {v}",
  });

  function getBallClass(number, ranking) {
    const index = ranking.indexOf(number);

    if (index <= 4) return "ball super-hot";
    if (index <= 9) return "ball hot";
    if (index <= 14) return "ball medium";
    if (index <= 19) return "ball cold";
    return "ball very-cold";
  }

  async function runMultiSimulation() {
    const selected = [...document.querySelectorAll("input[type=checkbox]:checked")].map((cb) => cb.value);

    const manualPlay = document.getElementById("manualPlay").value;

    const response = await fetch("/api/simulate_multi", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        modes: selected,
        manual_play: manualPlay,
      }),
    });

    const data = await response.json();
    if (!response.ok) {
      await KA.uiAlert(data.error || KA.t("simv_error"));
      return;
    }

    const ranking = data.ranking;

    let html = `<div class="cards">`;

    data.results.forEach((r, idx) => {
      const bestBadge = r.is_best ? KA.t("simv_best") : "";

      html += `
        <div class="card">
            <h3>${r.mode} ${bestBadge}</h3>

            <div class="balls">
                ${r.play
                  .map((n) => `<div class="${getBallClass(n, ranking)}">${n}</div>`)
                  .join("")}
            </div>

            <p>${KA.f("simv_simulated", { v: r.avg_sim })}</p>
            <p>${KA.f("simv_real", { v: r.avg_real })}</p>
            <p>${KA.f("simv_diff", { v: r.diff })}</p>
            <p>${KA.f("simv_precision", { v: r.precision })}</p>

            <canvas id="chart${idx}" height="100"></canvas>
        </div>
        `;
    });

    html += `</div>`;

    document.getElementById("comparisonContainer").innerHTML = html;

    data.results.forEach((r, idx) => {
      new Chart(document.getElementById(`chart${idx}`), {
        type: "line",
        data: {
          labels: Object.keys(r.distribution_sim || {}),
          datasets: [
            {
              label: KA.t("simv_distribution"),
              data: Object.values(r.distribution_sim || {}),
              borderColor: r.is_best ? "#3f7db7" : "#7b98be",
              tension: 0.4,
            },
          ],
        },
        options: {
          plugins: { legend: { display: false } },
        },
      });
    });
  }
</script>

<br />

<div class="card">
  <h3 data-i18n="simv_strategy_ranking">Ranking Estrategico Adaptativo</h3>
  <div id="strategyRanking"></div>
</div>

<script>
  async function loadRanking() {
    const response = await fetch("/api/strategy_ranking");
    const data = await response.json();

    let html = "";

    data.forEach((r, index) => {
      html += `
            <p>
                ${index === 0 ? KA.t("simv_top") : ""}
                ${r.mode} -
                ${KA.f("simv_avg_precision", { v: r.avg_precision.toFixed(2) })}
                | ${KA.f("simv_runs", { v: r.total_runs })}
            </p>
        `;
    });

    document.getElementById("strategyRanking").innerHTML = html;
  }

  loadRanking();
</script>

{% endblock %}
