{% extends "base.html" %}
{% block content %}
<h1 data-i18n="prob_title">Probabilidad</h1>
<p data-i18n="prob_subtitle">Calculos matematicos y analisis de tickets</p>

<div class="split-2">
  <div class="card">
    <h3 data-i18n="prob_math_title">Calculadora Matematica</h3>
    <div class="inline-controls">
      <div>
        <label data-i18n="prob_total_numbers">Total numeros</label>
        <input id="totalNumbers" type="number" value="25" min="1" max="60" />
      </div>
      <div>
        <label data-i18n="prob_selected_numbers">Seleccionados</label>
        <input id="selectedNumbers" type="number" value="14" min="1" max="25" />
      </div>
      <button class="btn-modern" onclick="calcMath()" data-i18n="prob_calculate">Calcular</button>
    </div>
    <div class="card inner-card">
      <h2 id="inverseText">1 : -</h2>
      <p id="probText">-</p>
      <p id="combText">-</p>
    </div>
  </div>

  <div class="card">
    <h3 data-i18n="prob_verify_title">Verificar Ticket vs Historial</h3>
    <p data-i18n="prob_select_14">Selecciona 14 numeros para analizar:</p>
    <div id="ticketGrid" class="number-grid"></div>
    <p><span id="ticketCount">0</span> / 14</p>
    <button class="btn-modern" onclick="scoreTicket()" data-i18n="prob_ticket_score_action">Calcular Score del Ticket</button>
    <br /><br />
    <p id="ticketScore">-</p>
    <p id="ticketAvg">-</p>
    <p id="ticketBest">-</p>
  </div>
</div>

<br />

<div class="card">
  <h3 data-i18n="prob_compare_title">Comparativa de combinaciones</h3>
  <canvas id="combChart" height="120"></canvas>
</div>

<script>
  Object.assign(KA.i18n.es, {
    prob_title: "Probabilidad",
    prob_subtitle: "Calculos matematicos y analisis de tickets",
    prob_math_title: "Calculadora Matematica",
    prob_total_numbers: "Total numeros",
    prob_selected_numbers: "Seleccionados",
    prob_calculate: "Calcular",
    prob_verify_title: "Verificar Ticket vs Historial",
    prob_select_14: "Selecciona 14 numeros para analizar:",
    prob_ticket_score_action: "Calcular Score del Ticket",
    prob_compare_title: "Comparativa de combinaciones",
    prob_exact: "Probabilidad exacta: {value}%",
    prob_combinations: "Combinaciones: {value}",
    prob_score: "Score: {value}%",
    prob_avg_hits: "Promedio aciertos: {value}",
    prob_best_record: "Mejor registro: sorteo #{index} ({hits} aciertos)",
    prob_err_calc: "No se pudo calcular",
    prob_err_ticket: "No se pudo calcular ticket",
  });
  Object.assign(KA.i18n.en, {
    prob_title: "Probability",
    prob_subtitle: "Math calculations and ticket analysis",
    prob_math_title: "Math Calculator",
    prob_total_numbers: "Total numbers",
    prob_selected_numbers: "Selected",
    prob_calculate: "Calculate",
    prob_verify_title: "Check Ticket vs History",
    prob_select_14: "Select 14 numbers to analyze:",
    prob_ticket_score_action: "Calculate Ticket Score",
    prob_compare_title: "Combination Comparison",
    prob_exact: "Exact probability: {value}%",
    prob_combinations: "Combinations: {value}",
    prob_score: "Score: {value}%",
    prob_avg_hits: "Average hits: {value}",
    prob_best_record: "Best record: draw #{index} ({hits} hits)",
    prob_err_calc: "Calculation failed",
    prob_err_ticket: "Ticket calculation failed",
  });

  let combChart = null;
  const ticketSet = new Set();

  function renderTicketGrid() {
    const grid = document.getElementById('ticketGrid');
    grid.innerHTML = '';
    for (let n = 1; n <= 25; n++) {
      const active = ticketSet.has(n) ? 'active-number' : '';
      grid.insertAdjacentHTML('beforeend', `<button class="number-btn ${active}" onclick="toggleTicketNum(${n})">${n}</button>`);
    }
    document.getElementById('ticketCount').innerText = ticketSet.size;
  }

  function toggleTicketNum(n) {
    if (ticketSet.has(n)) ticketSet.delete(n);
    else if (ticketSet.size < 14) ticketSet.add(n);
    renderTicketGrid();
  }

  async function calcMath() {
    const payload = {
      total_numbers: parseInt(document.getElementById('totalNumbers').value, 10),
      selected: parseInt(document.getElementById('selectedNumbers').value, 10)
    };

    const response = await fetch('/api/probability_math', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    const data = await response.json();
    if (!response.ok) {
      await KA.uiAlert(data.error || KA.t('prob_err_calc'));
      return;
    }

    document.getElementById('inverseText').innerText = data.inverse_text;
    const locale = KA.currentLanguage() === 'en' ? 'en-US' : 'es-CL';
    document.getElementById('probText').innerText = KA.f('prob_exact', { value: Number(data.probability_percent).toLocaleString(locale, { minimumFractionDigits: 10, maximumFractionDigits: 10 }) });
    document.getElementById('combText').innerText = KA.f('prob_combinations', { value: Number(data.combinations).toLocaleString(locale) });

    if (combChart) combChart.destroy();
    combChart = new Chart(document.getElementById('combChart'), {
      type: 'bar',
      data: {
        labels: data.bars.map(b => b.label),
        datasets: [{ data: data.bars.map(b => b.value), backgroundColor: '#3f7db7' }]
      },
      options: { plugins: { legend: { display: false } } }
    });
  }

  async function scoreTicket() {
    const ticket = [...ticketSet].sort((a, b) => a - b);

    const response = await fetch('/api/ticket_score', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ticket })
    });

    const data = await response.json();
    if (!response.ok) {
      await KA.uiAlert(data.error || KA.t('prob_err_ticket'));
      return;
    }

    document.getElementById('ticketScore').innerText = KA.f('prob_score', { value: data.score_pct });
    document.getElementById('ticketAvg').innerText = KA.f('prob_avg_hits', { value: data.avg_hits });
    document.getElementById('ticketBest').innerText = KA.f('prob_best_record', { index: data.best_draw_index, hits: data.max_hits });
  }

  renderTicketGrid();
  calcMath();
</script>
{% endblock %}
