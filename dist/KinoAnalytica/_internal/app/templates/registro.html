{% extends "base.html" %}
{% block content %}

<h1 data-i18n="record_title">Registro de Resultados</h1>

<div class="card">
  <h3 data-i18n="record_play_title">Registrar Jugada</h3>

  <input type="date" id="dateField" class="input-modern" />

  <input
    type="text"
    id="userPlay"
    class="input-modern"
    data-i18n-placeholder="record_user_play_placeholder"
    placeholder="Tu jugada (14 numeros separados por coma)"
  />

  <input
    type="text"
    id="realResult"
    class="input-modern"
    data-i18n-placeholder="record_result_placeholder"
    placeholder="Resultado real (14 numeros separados por coma)"
  />

  <br /><br />

  <button onclick="saveResult()" class="btn-modern" data-i18n="record_save">Guardar</button>
</div>

<br />

<div class="card">
  <h3 data-i18n="record_excel_title">Exportar / Importar Excel</h3>

  <button onclick="exportExcel()" class="btn-modern" data-i18n="record_export">Exportar Excel</button>

  <div class="file-picker">
    <label for="excelFile" class="btn-edit" data-i18n="record_choose_file">Elegir archivo</label>
    <span id="excelFileName" class="file-name" data-i18n="record_no_file">No se ha seleccionado ningun archivo</span>
    <input type="file" id="excelFile" />
  </div>
  <button onclick="importExcel()" class="btn-modern" data-i18n="record_import">Importar Excel</button>
</div>

<br />

<div class="card">
  <h3 data-i18n="record_history">Historial</h3>
  <div id="registroLegend"></div>
  <div id="historyTable"></div>
</div>

<script>
  Object.assign(KA.i18n.es, {
    record_title: "Registro de Resultados",
    record_play_title: "Registrar Jugada",
    record_user_play_placeholder: "Tu jugada (14 numeros separados por coma)",
    record_result_placeholder: "Resultado real (14 numeros separados por coma)",
    record_save: "Guardar",
    record_excel_title: "Exportar / Importar Excel",
    record_export: "Exportar Excel",
    record_import: "Importar Excel",
    record_choose_file: "Elegir archivo",
    record_no_file: "No se ha seleccionado ningun archivo",
    record_history: "Historial",
    record_save_error: "No se pudo guardar",
    record_delete_confirm: "Eliminar registro?",
    record_delete_error: "No se pudo eliminar",
    record_edit_date: "Editar fecha:",
    record_edit_play: "Editar jugada:",
    record_edit_result: "Editar resultado:",
    record_update_error: "No se pudo actualizar",
    record_select_file: "Selecciona un archivo",
    record_import_error: "No se pudo importar",
    record_th_date: "Fecha",
    record_th_play: "Jugada",
    record_th_result: "Resultado",
    record_th_hits: "Aciertos",
    record_th_pct: "%",
    record_th_actions: "Acciones",
    record_edit: "Editar",
    record_delete: "Eliminar",
  });
  Object.assign(KA.i18n.en, {
    record_title: "Results Log",
    record_play_title: "Register Play",
    record_user_play_placeholder: "Your play (14 comma-separated numbers)",
    record_result_placeholder: "Actual result (14 comma-separated numbers)",
    record_save: "Save",
    record_excel_title: "Export / Import Excel",
    record_export: "Export Excel",
    record_import: "Import Excel",
    record_choose_file: "Choose file",
    record_no_file: "No file selected",
    record_history: "History",
    record_save_error: "Could not save",
    record_delete_confirm: "Delete record?",
    record_delete_error: "Could not delete",
    record_edit_date: "Edit date:",
    record_edit_play: "Edit play:",
    record_edit_result: "Edit result:",
    record_update_error: "Could not update",
    record_select_file: "Select a file",
    record_import_error: "Could not import",
    record_th_date: "Date",
    record_th_play: "Play",
    record_th_result: "Result",
    record_th_hits: "Hits",
    record_th_pct: "%",
    record_th_actions: "Actions",
    record_edit: "Edit",
    record_delete: "Delete",
  });

  function splitInput(raw) {
    return raw
      .split(",")
      .map((s) => s.trim())
      .filter(Boolean);
  }

  async function saveResult() {
    const date = document.getElementById("dateField").value;
    const userPlay = splitInput(document.getElementById("userPlay").value);
    const realResult = splitInput(document.getElementById("realResult").value);

    const response = await fetch("/api/compare_result", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        date: date,
        user_play: userPlay,
        real_result: realResult,
      }),
    });

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      await KA.uiAlert(err.error || KA.t("record_save_error"));
      return;
    }

    await loadHistory();
  }

  async function deleteRow(id) {
    if (!(await KA.uiConfirm(KA.t("record_delete_confirm")))) return;

    const response = await fetch("/api/delete_result", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ id: id }),
    });

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      await KA.uiAlert(err.error || KA.t("record_delete_error"));
      return;
    }

    await loadHistory();
  }

  async function editRow(id, date, play, result) {
    const newDate = await KA.uiPrompt(KA.t("record_edit_date"), date);
    if (!newDate) return;

    const newPlay = await KA.uiPrompt(KA.t("record_edit_play"), play);
    if (!newPlay) return;

    const newResult = await KA.uiPrompt(KA.t("record_edit_result"), result);
    if (!newResult) return;

    const response = await fetch("/api/update_result", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        id: id,
        date: newDate,
        user_play: splitInput(newPlay),
        real_result: splitInput(newResult),
      }),
    });

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      await KA.uiAlert(err.error || KA.t("record_update_error"));
      return;
    }

    await loadHistory();
  }

  async function loadHistory() {
    const response = await fetch("/api/get_history");
    const data = await response.json();

    let html = `
    <table class="modern-table">
      <thead>
        <tr>
          <th>${KA.t("record_th_date")}</th>
          <th>${KA.t("record_th_play")}</th>
          <th>${KA.t("record_th_result")}</th>
          <th>${KA.t("record_th_hits")}</th>
          <th>${KA.t("record_th_pct")}</th>
          <th>${KA.t("record_th_actions")}</th>
        </tr>
      </thead>
      <tbody>
    `;

    data.forEach((row) => {
      html += `
        <tr>
          <td>${row.date}</td>
          <td><div class="thermal-numbers" data-numbers="${row.user_play}">${row.user_play}</div></td>
          <td><div class="thermal-numbers" data-numbers="${row.real_result}">${row.real_result}</div></td>
          <td>${row.hit_count}</td>
          <td>${row.percentage}%</td>
          <td>
            <button onclick="editRow(${row.id}, '${row.date}', '${row.user_play}', '${row.real_result}')" class="btn-edit">${KA.t("record_edit")}</button>
            <button onclick="deleteRow(${row.id})" class="btn-delete">${KA.t("record_delete")}</button>
          </td>
        </tr>
        `;
    });

    html += "</tbody></table>";

    document.getElementById("historyTable").innerHTML = html;
    KA.renderThermalNodes(document.getElementById("historyTable"));
  }

  function exportExcel() {
    window.location.href = "/api/export_excel";
  }

  async function importExcel() {
    const fileInput = document.getElementById("excelFile");
    const file = fileInput.files[0];

    if (!file) {
      await KA.uiAlert(KA.t("record_select_file"));
      return;
    }

    const formData = new FormData();
    formData.append("file", file);

    const response = await fetch("/import_excel", {
      method: "POST",
      body: formData,
    });

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      await KA.uiAlert(err.error || KA.t("record_import_error"));
      return;
    }

    await loadHistory();
  }

  function updateExcelFileName() {
    const input = document.getElementById("excelFile");
    const nameNode = document.getElementById("excelFileName");
    const file = input.files && input.files[0];
    nameNode.textContent = file ? file.name : KA.t("record_no_file");
  }

  loadHistory();
  document.getElementById("excelFile").addEventListener("change", updateExcelFileName);
  KA.renderLegend("registroLegend");
  document.addEventListener("ka:language-changed", () => {
    loadHistory();
    updateExcelFileName();
    KA.renderLegend("registroLegend");
  });
  updateExcelFileName();
</script>

{% endblock %}
